<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- p5.js library
         Required for canvas creation, draw loop, input handling, and loadImage.
         Loaded before custom scripts so p5 functions are available globally. -->
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.js"></script>
    <link rel="stylesheet" href="style.css"> 
  </head>

  <body>
    <!-- Button class is loaded first because sketch.js creates Button instances.
         This avoids 'Button is not defined' errors and keeps UI modular. -->
    <script src="Button.js"></script>

    <!-- Main game logic (scene manager, physics, collisions, rendering). -->
    <script src="sketch.js"></script>
  </body>
</html>
